<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #topbar {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: #1a1a1a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
  .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .dot.yellow { background: #eab308; }
  #status-text { font-size: 12px; color: #888; }
  .spacer { flex: 1; }

  button {
    padding: 7px 16px; border-radius: 8px; border: 1px solid #333;
    background: #222; color: #f0f0f0; font-size: 13px; cursor: pointer; transition: background 0.15s;
  }
  button:hover { background: #2e2e2e; }
  button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
  button.primary:hover { background: #1d4ed8; }
  button.danger { background: #dc2626; border-color: #dc2626; color: #fff; }
  button.danger:hover { background: #b91c1c; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  #main { display: flex; flex: 1; overflow: hidden; }

  #preview-panel { width: 52%; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; background: #111; }
  #preview-header { padding: 10px 14px; font-size: 12px; color: #555; border-bottom: 1px solid #1e1e1e; }
  #preview-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; background: #0d0d0d; }
  #preview-video { max-width: 100%; max-height: 100%; border-radius: 8px; display: none; border: 1px solid #2a2a2a; }
  #preview-canvas { max-width: 100%; max-height: 100%; border-radius: 8px; display: none; border: 1px solid #2a2a2a; }

  #placeholder { text-align: center; color: #333; }
  #placeholder svg { margin-bottom: 12px; }
  #placeholder p { font-size: 14px; color: #444; }
  #placeholder small { font-size: 12px; color: #2a2a2a; display: block; margin-top: 6px; }

  #preview-actions { padding: 10px 14px; border-top: 1px solid #1e1e1e; display: flex; gap: 8px; }
  #capture-btn { flex: 1; }

  #chat-panel { flex: 1; display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

  .msg { display: flex; gap: 8px; max-width: 92%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.55; background: #1e1e1e; color: #ddd; white-space: pre-wrap; word-break: break-word; }
  .msg.user .msg-bubble { background: #2563eb; color: #fff; border-radius: 12px 12px 4px 12px; }
  .msg.assistant .msg-bubble { border-radius: 12px 12px 12px 4px; }
  .msg-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .msg.user .msg-avatar { background: #1d4ed8; color: #fff; }
  .msg.assistant .msg-avatar { background: #6d28d9; color: #fff; }
  .screenshot-thumb { max-width: 180px; border-radius: 6px; margin-bottom: 8px; display: block; border: 1px solid rgba(255,255,255,0.15); }

  .typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #555; animation: bounce 1.1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; text-align: center; gap: 10px; }
  .empty-chat p { font-size: 14px; color: #444; }
  .empty-chat small { font-size: 12px; color: #2a2a2a; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 14px 10px; }
  .chip { padding: 5px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; font-size: 12px; color: #666; cursor: pointer; transition: all 0.15s; }
  .chip:hover { background: #222; color: #bbb; border-color: #3a3a3a; }

  #input-area { padding: 10px 14px; border-top: 1px solid #1e1e1e; display: flex; gap: 8px; align-items: flex-end; }
  #question-input { flex: 1; padding: 9px 13px; background: #1a1a1a; border: 1px solid #2e2e2e; border-radius: 10px; color: #f0f0f0; font-size: 14px; outline: none; resize: none; min-height: 40px; max-height: 110px; font-family: inherit; line-height: 1.4; }
  #question-input:focus { border-color: #2563eb; }
  #question-input::placeholder { color: #444; }
  #send-btn { padding: 9px 18px; }

  #error-banner { display: none; background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; padding: 8px 14px; font-size: 13px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="dot" id="status-dot"></div>
  <h1>Screen AI</h1>
  <span id="status-text">No screen shared</span>
  <div class="spacer"></div>
  <button id="share-btn" class="primary" onclick="startShare()">Share screen</button>
  <button id="stop-btn" class="danger" style="display:none" onclick="stopSharing()">Stop sharing</button>
</div>

<div id="error-banner" id="error-banner"></div>

<div id="main">
  <div id="preview-panel">
    <div id="preview-header">Live preview</div>
    <div id="preview-container">
      <video id="preview-video" autoplay muted playsinline></video>
      <canvas id="preview-canvas"></canvas>
      <div id="placeholder">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.2">
          <rect x="2" y="3" width="20" height="15" rx="2"/>
          <path d="M8 21h8M12 18v3"/>
        </svg>
        <p>No screen shared</p>
        <small>Click "Share screen" above to start</small>
      </div>
    </div>
    <div id="preview-actions">
      <button id="capture-btn" class="primary" disabled onclick="captureScreen()">Capture screenshot</button>
      <button id="clear-btn" disabled onclick="clearCapture()">Clear</button>
    </div>
  </div>

  <div id="chat-panel">
    <div id="messages">
      <div class="empty-chat" id="empty-chat">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2a2a2a" stroke-width="1.5">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <p>Ask AI about your screen</p>
        <small>Share screen → capture → ask a question</small>
      </div>
    </div>

    <div class="chips">
      <div class="chip" onclick="setQ('What do you see on my screen?')">What do you see?</div>
      <div class="chip" onclick="setQ('Read all the text on my screen')">Read text</div>
      <div class="chip" onclick="setQ('Summarize what is on my screen')">Summarize</div>
      <div class="chip" onclick="setQ('Are there any errors or issues visible?')">Find errors</div>
      <div class="chip" onclick="setQ('What application or website is this?')">What app is this?</div>
    </div>

    <div id="input-area">
      <textarea id="question-input" placeholder="Ask about your screen... (Enter to send)" rows="1"
        oninput="updateSend()" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" class="primary" disabled onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
let stream = null;
let capturedBase64 = null;
let isSharing = false;

const video = document.getElementById('preview-video');
const canvas = document.getElementById('preview-canvas');
const placeholder = document.getElementById('placeholder');
const shareBtn = document.getElementById('share-btn');
const stopBtn = document.getElementById('stop-btn');
const captureBtn = document.getElementById('capture-btn');
const clearBtn = document.getElementById('clear-btn');
const sendBtn = document.getElementById('send-btn');
const questionInput = document.getElementById('question-input');
const messagesEl = document.getElementById('messages');
const emptyChat = document.getElementById('empty-chat');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

async function startShare() {
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 5, cursor: 'always' },
      audio: false
    });
    video.srcObject = stream;
    await video.play().catch(() => {});
    video.style.display = 'block';
    placeholder.style.display = 'none';
    canvas.style.display = 'none';
    isSharing = true;
    shareBtn.style.display = 'none';
    stopBtn.style.display = '';
    captureBtn.disabled = false;
    statusDot.className = 'dot green';
    statusText.textContent = 'Sharing screen';
    stream.getVideoTracks()[0].addEventListener('ended', stopSharing);
  } catch (e) {
    if (e.name !== 'NotAllowedError') showError('Could not share screen: ' + e.message);
  }
}

function stopSharing() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  video.style.display = 'none';
  isSharing = false;
  shareBtn.style.display = '';
  stopBtn.style.display = 'none';
  captureBtn.disabled = true;
  statusDot.className = 'dot';
  statusText.textContent = capturedBase64 ? 'Screenshot ready' : 'No screen shared';
}

function captureScreen() {
  if (!stream) return;
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  capturedBase64 = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
  canvas.style.display = 'block';
  video.style.display = 'none';
  clearBtn.disabled = false;
  statusText.textContent = 'Screenshot captured';
  statusDot.className = 'dot yellow';
  updateSend();
}

function clearCapture() {
  capturedBase64 = null;
  canvas.style.display = 'none';
  clearBtn.disabled = true;
  if (isSharing) video.style.display = 'block';
  else placeholder.style.display = '';
  statusDot.className = isSharing ? 'dot green' : 'dot';
  statusText.textContent = isSharing ? 'Sharing screen' : 'No screen shared';
  updateSend();
}

function updateSend() {
  sendBtn.disabled = !capturedBase64 || !questionInput.value.trim();
  questionInput.style.height = 'auto';
  questionInput.style.height = Math.min(questionInput.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
}

function setQ(text) { questionInput.value = text; updateSend(); questionInput.focus(); }

function showError(msg) {
  const b = document.getElementById('error-banner');
  b.textContent = msg; b.style.display = 'block';
  setTimeout(() => b.style.display = 'none', 5000);
}

function addMsg(role, text, imgBase64) {
  emptyChat.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'user' ? 'You' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (imgBase64) {
    const img = document.createElement('img');
    img.src = 'data:image/jpeg;base64,' + imgBase64;
    img.className = 'screenshot-thumb';
    bubble.appendChild(img);
  }
  bubble.appendChild(document.createTextNode(text));
  wrap.appendChild(av); wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant'; wrap.id = 'typing';
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = 'AI';
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  wrap.appendChild(av); wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

async function sendMessage() {
  const q = questionInput.value.trim();
  if (!q || !capturedBase64) return;
  addMsg('user', q, capturedBase64);
  questionInput.value = ''; updateSend();
  sendBtn.disabled = true;
  const typing = addTyping();
  try {
    const r = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: capturedBase64, question: q })
    });
    const data = await r.json();
    typing.remove();
    if (!r.ok) showError(data.error || 'Request failed');
    else addMsg('assistant', data.text || '(no response)');
  } catch (e) {
    typing.remove(); showError('Network error: ' + e.message);
  }
  updateSend();
}
</script>
</body>
</html>
